name: Submodule Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-submodule-pointers:
    name: Validate Submodule Pointers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Verify submodule HEADs match gitlinks
        run: |
          set -euo pipefail
          while read -r path; do
            expected="$(git ls-tree HEAD "$path" | awk '{print $3}')"
            actual="$(git -C "$path" rev-parse HEAD)"
            echo "Checking $path: expected=$expected actual=$actual"
            if [ "$expected" != "$actual" ]; then
              echo "Submodule pointer mismatch for $path"
              exit 1
            fi
          done < <(git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | awk '{print $2}')

      - name: Print submodule status
        run: git submodule status --recursive

  require-submodule-notes:
    name: Require Submodule Notes (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate submodule update notes in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const core = require("@actions/core");
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const changed = files.map((f) => f.filename);
            const watched = new Set([".gitmodules", "bamboo", "bodhi", "lotus"]);
            const touchedSubmodules = changed.filter((f) => watched.has(f));

            if (touchedSubmodules.length === 0) {
              core.info("No submodule pointer changes detected.");
              return;
            }

            const body = (context.payload.pull_request.body || "").trim();
            if (!body) {
              core.setFailed(
                `Submodule pointers changed (${touchedSubmodules.join(", ")}), but PR body is empty.`,
              );
              return;
            }

            const match = body.match(/##\s*Submodule Updates\s*([\s\S]*?)(?:\n##\s|$)/i);
            if (!match) {
              core.setFailed(
                "Submodule pointers changed, but PR body is missing a '## Submodule Updates' section.",
              );
              return;
            }

            const rawSection = match[1]
              .replace(/<!--[\s\S]*?-->/g, "")
              .trim();

            const compact = rawSection.replace(/[`*_>\-\s]/g, "").toLowerCase();
            const invalid = new Set(["none", "n/a", "na", "nochange", "nochanges", "same"]);

            if (!compact || compact.length < 15 || invalid.has(compact) || /describe\s+why/i.test(rawSection)) {
              core.setFailed(
                "Please provide a concrete explanation in '## Submodule Updates' (what changed and why).",
              );
              return;
            }

            core.info(`Submodule update notes validated for: ${touchedSubmodules.join(", ")}`);
